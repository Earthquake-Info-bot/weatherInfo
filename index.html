<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>気象情報ビューアー</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#eef2f6;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

header{
    background:#1565c0;
    color:#fff;
    text-align:center;
    padding:18px;
    font-size:22px;
    font-weight:bold;
    position:sticky;
    top:0;
}

#cards{
    max-width:850px;
    margin:20px auto;
    padding:0 15px;
}

.card{
    background:#fff;
    border-radius:14px;
    box-shadow:0 3px 10px rgba(0,0,0,.12);
    margin-bottom:18px;
    overflow:hidden;
}

.title{
    background:#2e7d32;
    color:white;
    padding:12px 16px;
    font-size:18px;
    font-weight:bold;
}

pre{
    margin:0;
    padding:16px;
    white-space:pre-wrap;
    word-break:break-word;
    line-height:1.6;
    font-family:inherit;
}

button{
    width:100%;
    border:none;
    background:#1976d2;
    color:white;
    padding:14px;
    font-size:16px;
    cursor:pointer;
    transition:.2s;
}

button:not(:disabled):hover{
    background:#125ea9;
}

.loading{
    text-align:center;
    padding:40px;
    color:#666;
}

.buttons{
    display:flex;
    gap:8px;
    padding:12px;
    background:#f7f7f7;
}

.buttons button{
    flex:1;
    margin:0;
}

details{
    border-top:1px solid #ddd;
}

summary{
    cursor:pointer;
    padding:14px 16px;
    font-weight:bold;
    color:#1565c0;
    user-select:none;
    outline:none;
}

details pre{
    padding-top:0;
}

.copy-all{
    background:#1976d2;
}

.copy-head{
    background:#43a047;
}

.copy-body{
    background:#757575;
}

.copy-body:disabled{
    background:#bdbdbd;
    cursor:not-allowed;
}
</style>
</head>

<body>

<header>気象情報コピー</header>

<div id="cards">
<div class="loading">読み込み中...</div>
</div>

<script>

const INFO_URL = "https://www.jma.go.jp/bosai/information/data/r8/information.json";
const DENBUN = "https://www.jma.go.jp/bosai/information/data/r8/denbun/";

load();

async function load(){

    const infos = await fetch(INFO_URL).then(r=>r.json());

    const latest = infos
        .filter(v=>v.jsonName)
        .reverse()
        .slice(0,10);

    const cards = document.getElementById("cards");
    cards.innerHTML="";

    for(const item of latest){

        const detail = await fetch(DENBUN + item.jsonName + ".json")
            .then(r=>r.json());

        const headline=(detail.headlineText||"").trim();

        const comment=(detail.commentText||"")
            .replaceAll("<br>","\n")
            .trim();

        const icon = detail.headTitle.includes("防災速報") ? "⚠️" : "🟩";

        const headerText =`${icon}${detail.headTitle}${icon}
${format(detail.reportDatetime)} 発表

${headline}`;
            
        const fullText = headerText + (comment ? "\n\n" + comment : "");

        const card=document.createElement("div");
        card.className="card";

card.innerHTML=`
    <div class="title">${escape(detail.headTitle)}</div>

    <div class="buttons">
        <button class="copy-all">全体コピー</button>
        <button class="copy-head">見出し</button>
        <button class="copy-body" ${comment ? "" : "disabled"}>本文</button>
    </div>

    <pre>${escape(headerText)}</pre>

    ${
        comment
        ? `
        <details>
            <summary>本文を表示</summary>
            <pre>${escape(comment)}</pre>
        </details>
        `
        : ""
    }
`;

        const btnAll = card.querySelector(".copy-all");
        const btnHead = card.querySelector(".copy-head");
        const btnBody = card.querySelector(".copy-body");
        
        async function copy(btn,text){
            await navigator.clipboard.writeText(text);
            const before = btn.textContent;
            btn.textContent = "コピーしました！";
            setTimeout(()=>btn.textContent = before,1200);
        }
        
        btnAll.onclick = ()=>copy(btnAll, fullText);
        btnHead.onclick = ()=>copy(btnHead, headerText);
        
        if(comment){
            btnBody.onclick = ()=>copy(btnBody, comment);
        }

        cards.appendChild(card);
    }

}

function format(iso){
    const d=new Date(iso);
    return `${d.getMonth()+1}月${d.getDate()}日${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}

function escape(str){
    return str
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;");
}

</script>

</body>
</html>
